# CodeQL Configuration for Cloud Gallery
# This configuration customizes CodeQL analysis for security scanning

name: "Cloud Gallery CodeQL Config"

# Disable default queries and use security-focused queries
disable-default-queries: false

# Query packs to use
queries:
  - uses: security-extended
  - uses: security-and-quality

# Paths to exclude from analysis
paths-ignore:
  - '**/node_modules/**'
  - '**/dist/**'
  - '**/build/**'
  - '**/coverage/**'
  - '**/*.test.ts'
  - '**/*.test.tsx'
  - '**/*.spec.ts'
  - '**/vitest.config.ts'
  - '**/vitest.setup.ts'

# Paths to include
paths:
  - 'server/**'
  - 'client/**'
  - 'shared/**'
