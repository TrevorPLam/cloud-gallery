name: Security Scanning

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run weekly security scans on Sunday at midnight
    - cron: '0 0 * * 0'

# Minimal permissions by default (principle of least privilege)
permissions:
  contents: read
  security-events: write
  pull-requests: write
  issues: write

jobs:
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
      with:
        persist-credentials: false
    
    - name: Setup Node.js
      uses: actions/setup-node@1e60f620b9541d16bece96c5465dc8ee9832be0b # v4.0.3
      with:
        node-version: '20.x'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run npm audit (fail on critical/high)
      run: |
        npm audit --audit-level=moderate --json > npm-audit.json || true
        
        CRITICAL=$(jq '.metadata.vulnerabilities.critical // 0' npm-audit.json)
        HIGH=$(jq '.metadata.vulnerabilities.high // 0' npm-audit.json)
        
        echo "🔍 Vulnerability Summary:"
        echo "  Critical: $CRITICAL"
        echo "  High: $HIGH"
        
        if [ "$CRITICAL" -gt "0" ]; then
          echo "❌ CRITICAL vulnerabilities found - blocking build"
          npm audit --audit-level=critical
          exit 1
        fi
        
        if [ "$HIGH" -gt "0" ]; then
          echo "❌ HIGH severity vulnerabilities found - blocking build"
          npm audit --audit-level=high
          exit 1
        fi
        
        echo "✅ No critical or high severity vulnerabilities found"
    
    - name: Upload audit results
      if: always()
      uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874 # v4.4.0
      with:
        name: npm-audit-report
        path: npm-audit.json
        retention-days: 30
    
    - name: Comment on PR with results
      if: github.event_name == 'pull_request' && always()
      uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
      with:
        script: |
          const fs = require('fs');
          let audit;
          try {
            audit = JSON.parse(fs.readFileSync('npm-audit.json', 'utf8'));
          } catch (e) {
            console.log('No audit file found');
            return;
          }
          
          const critical = audit.metadata.vulnerabilities.critical || 0;
          const high = audit.metadata.vulnerabilities.high || 0;
          const moderate = audit.metadata.vulnerabilities.moderate || 0;
          const low = audit.metadata.vulnerabilities.low || 0;
          
          const status = (critical === 0 && high === 0) ? '✅' : '❌';
          
          const comment = `## ${status} Dependency Scan Results
          
          | Severity | Count |
          |----------|-------|
          | Critical | ${critical} |
          | High | ${high} |
          | Moderate | ${moderate} |
          | Low | ${low} |
          
          ${critical > 0 || high > 0 ? '⚠️ **Build blocked due to critical/high vulnerabilities**' : '✅ All checks passed'}
          
          [View detailed report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });

  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Full history for secret scanning
    
    - name: TruffleHog Secret Scan
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: ${{ github.event.repository.default_branch }}
        head: HEAD
        extra_args: --only-verified

  codeql-analysis:
    name: CodeQL Security Analysis
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: javascript-typescript
        queries: security-and-quality
    
    - name: Autobuild
      uses: github/codeql-action/autobuild@v3
    
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:javascript-typescript"

  license-check:
    name: License Compliance Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Check licenses
      run: |
        npx license-checker --summary --onlyAllow "MIT;Apache-2.0;BSD-2-Clause;BSD-3-Clause;ISC;0BSD;CC0-1.0;Unlicense" || true
        
        echo "📋 Generating license report..."
        npx license-checker --json > licenses.json
        
        # Check for high-risk licenses
        if npx license-checker --failOn "GPL;AGPL;LGPL;SSPL;BUSL"; then
          echo "✅ No high-risk licenses found"
        else
          echo "⚠️ Warning: High-risk licenses detected"
          echo "Please review licenses before merging"
        fi
    
    - name: Upload license report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: license-report
        path: licenses.json
        retention-days: 30

  sbom-generation:
    name: Generate SBOM
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Generate CycloneDX SBOM
      run: |
        npx @cyclonedx/cyclonedx-npm --output-file sbom-cyclonedx.json
    
    - name: Generate SPDX SBOM
      run: |
        npx @cyclonedx/cyclonedx-npm --output-format spdx --output-file sbom-spdx.json || true
    
    - name: Upload SBOM
      uses: actions/upload-artifact@v4
      with:
        name: sbom-reports
        path: |
          sbom-*.json
        retention-days: 90
    
    - name: Attach SBOM to release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        echo "SBOM generated for main branch"
        # In production, attach to GitHub release

  pen-test-scaffold:
    name: Pen Test Scaffold
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run pen-test scaffold
      run: bash scripts/pen-test.sh

  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [dependency-scan, secret-scan, codeql-analysis, license-check, sbom-generation]
    if: always() && github.event_name == 'pull_request'
    
    steps:
    - name: Post security summary
      uses: actions/github-script@v7
      with:
        script: |
          const depStatus = '${{ needs.dependency-scan.result }}';
          const secretStatus = '${{ needs.secret-scan.result }}';
          const codeqlStatus = '${{ needs.codeql-analysis.result }}';
          const licenseStatus = '${{ needs.license-check.result }}';
          const sbomStatus = '${{ needs.sbom-generation.result }}';
          
          const statusEmoji = (status) => {
            if (status === 'success') return '✅';
            if (status === 'failure') return '❌';
            return '⚠️';
          };
          
          const comment = `## 🔒 Security Scan Results
          
          | Check | Status |
          |-------|--------|
          | Dependency Scan | ${statusEmoji(depStatus)} ${depStatus} |
          | Secret Scan | ${statusEmoji(secretStatus)} ${secretStatus} |
          | CodeQL Analysis | ${statusEmoji(codeqlStatus)} ${codeqlStatus} |
          | License Check | ${statusEmoji(licenseStatus)} ${licenseStatus} |
          | SBOM Generation | ${statusEmoji(sbomStatus)} ${sbomStatus} |
          
          ${depStatus === 'failure' || secretStatus === 'failure' || codeqlStatus === 'failure' ? '⚠️ **Security issues detected!** Please review and fix before merging.' : '✅ All security checks passed!'}
          
          [View detailed results](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });
