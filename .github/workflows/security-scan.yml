name: Security Scanning

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run weekly security scans
    - cron: '0 0 * * 0'

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run npm audit
      run: |
        npm audit --audit-level=moderate --json > npm-audit.json || true
        npm audit --audit-level=moderate
      continue-on-error: true
    
    - name: Check for critical/high vulnerabilities
      run: |
        CRITICAL=$(jq '.metadata.vulnerabilities.critical // 0' npm-audit.json)
        HIGH=$(jq '.metadata.vulnerabilities.high // 0' npm-audit.json)
        
        echo "Critical vulnerabilities: $CRITICAL"
        echo "High vulnerabilities: $HIGH"
        
        if [ "$CRITICAL" -gt "0" ] || [ "$HIGH" -gt "0" ]; then
          echo "❌ Found critical or high severity vulnerabilities!"
          echo "Please review and fix vulnerabilities before merging."
          exit 1
        fi
        
        echo "✅ No critical or high severity vulnerabilities found"
    
    - name: Upload audit results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: npm-audit-report
        path: npm-audit.json
        retention-days: 30

  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Full history for secret scanning
    
    - name: TruffleHog Secret Scan
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: ${{ github.event.repository.default_branch }}
        head: HEAD
        extra_args: --only-verified

  codeql-analysis:
    name: CodeQL Security Analysis
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: javascript-typescript
        queries: security-and-quality
    
    - name: Autobuild
      uses: github/codeql-action/autobuild@v3
    
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:javascript-typescript"

  license-check:
    name: License Compliance Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Check licenses
      run: |
        npx license-checker --summary --onlyAllow "MIT;Apache-2.0;BSD-2-Clause;BSD-3-Clause;ISC;0BSD;CC0-1.0;Unlicense" || true
        
        echo "📋 Generating license report..."
        npx license-checker --json > licenses.json
        
        # Check for high-risk licenses
        if npx license-checker --failOn "GPL;AGPL;LGPL;SSPL;BUSL"; then
          echo "✅ No high-risk licenses found"
        else
          echo "⚠️ Warning: High-risk licenses detected"
          echo "Please review licenses before merging"
        fi
    
    - name: Upload license report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: license-report
        path: licenses.json
        retention-days: 30

  sbom-generation:
    name: Generate SBOM
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Generate CycloneDX SBOM
      run: |
        npx @cyclonedx/cyclonedx-npm --output-file sbom-cyclonedx.json
    
    - name: Generate SPDX SBOM
      run: |
        npx @cyclonedx/cyclonedx-npm --output-format spdx --output-file sbom-spdx.json || true
    
    - name: Upload SBOM
      uses: actions/upload-artifact@v4
      with:
        name: sbom-reports
        path: |
          sbom-*.json
        retention-days: 90
    
    - name: Attach SBOM to release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        echo "SBOM generated for main branch"
        # In production, attach to GitHub release

  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [dependency-scan, secret-scan, codeql-analysis, license-check, sbom-generation]
    if: always() && github.event_name == 'pull_request'
    
    steps:
    - name: Post security summary
      uses: actions/github-script@v7
      with:
        script: |
          const depStatus = '${{ needs.dependency-scan.result }}';
          const secretStatus = '${{ needs.secret-scan.result }}';
          const codeqlStatus = '${{ needs.codeql-analysis.result }}';
          const licenseStatus = '${{ needs.license-check.result }}';
          const sbomStatus = '${{ needs.sbom-generation.result }}';
          
          const statusEmoji = (status) => {
            if (status === 'success') return '✅';
            if (status === 'failure') return '❌';
            return '⚠️';
          };
          
          const comment = `## 🔒 Security Scan Results
          
          | Check | Status |
          |-------|--------|
          | Dependency Scan | ${statusEmoji(depStatus)} ${depStatus} |
          | Secret Scan | ${statusEmoji(secretStatus)} ${secretStatus} |
          | CodeQL Analysis | ${statusEmoji(codeqlStatus)} ${codeqlStatus} |
          | License Check | ${statusEmoji(licenseStatus)} ${licenseStatus} |
          | SBOM Generation | ${statusEmoji(sbomStatus)} ${sbomStatus} |
          
          ${depStatus === 'failure' || secretStatus === 'failure' || codeqlStatus === 'failure' ? '⚠️ **Security issues detected!** Please review and fix before merging.' : '✅ All security checks passed!'}
          
          [View detailed results](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });
