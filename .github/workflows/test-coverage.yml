name: Test Coverage

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

# Security: Use minimal permissions by default
permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
    - name: Checkout code
      uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
      with:
        persist-credentials: false

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@1e60f620b9541d16bece96c5465dc8ee9832be0b # v4.0.3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run linter
      run: npm run lint

    - name: Type check
      run: npm run check:types
    
    - name: Check code formatting
      run: npm run check:format

    - name: Run tests with coverage
      run: npm run test:coverage

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage/lcov.info
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: true

    - name: Archive coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report-${{ matrix.node-version }}
        path: coverage/
        retention-days: 30

    - name: Comment coverage on PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const coverage = JSON.parse(fs.readFileSync('coverage/coverage-final.json', 'utf8'));

          // Calculate summary
          let lines = 0, linesCovered = 0;
          let branches = 0, branchesCovered = 0;
          let functions = 0, functionsCovered = 0;

          for (const file in coverage) {
            const c = coverage[file];
            lines += c.s ? Object.keys(c.s).length : 0;
            linesCovered += c.s ? Object.values(c.s).filter(v => v > 0).length : 0;
            branches += c.b ? Object.keys(c.b).length * 2 : 0;
            branchesCovered += c.b ? Object.values(c.b).flat().filter(v => v > 0).length : 0;
            functions += c.f ? Object.keys(c.f).length : 0;
            functionsCovered += c.f ? Object.values(c.f).filter(v => v > 0).length : 0;
          }

          const linePct = ((linesCovered / lines) * 100).toFixed(2);
          const branchPct = ((branchesCovered / branches) * 100).toFixed(2);
          const funcPct = ((functionsCovered / functions) * 100).toFixed(2);

          const comment = `## Coverage Report 📊

          | Metric | Coverage |
          |--------|----------|
          | Lines | ${linePct}% |
          | Branches | ${branchPct}% |
          | Functions | ${funcPct}% |

          **Status**: ${linePct === '100.00' && branchPct === '100.00' && funcPct === '100.00' ? '✅ Perfect coverage!' : '⚠️ Coverage below 100%'}

          [View detailed report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`;

          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });
