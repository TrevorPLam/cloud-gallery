name: Test Coverage

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

# Security: Use minimal permissions by default
permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
    - name: Checkout code
      uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
      with:
        persist-credentials: false

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@1e60f620b9541d16bece96c5465dc8ee9832be0b # v4.0.3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run linter
      run: npm run lint

    - name: Block focused/skipped tests
      run: npm run test:check-focused

    - name: Type check
      run: npm run check:types
    
    - name: Check code formatting
      run: npm run check:format

    - name: Run tests with coverage
      run: npm run test:coverage

    - name: Extract test metrics
      run: |
        # Extract detailed test metrics
        npm run test:metrics
        npm run test:flaky-detect

    - name: Run accessibility tests
      run: npm run test:accessibility

    - name: Run performance tests
      run: npm run test:performance:ci

    - name: Run contract tests
      run: npm run test:contracts:consumer

    - name: Run security tests
      run: npm run test:security

    - name: Run compliance tests (HIPAA & GDPR)
      run: npm run test:compliance

    - name: Check accessibility compliance
      run: |
        # Check if accessibility tests passed and generate report
        if [ -f "coverage/a11y-results.json" ]; then
          echo "✅ Accessibility tests completed"
        else
          echo "⚠️ No accessibility results found"
        fi

    - name: Check performance compliance
      run: |
        # Check if performance tests passed and generate report
        if [ -f "coverage/performance-results.json" ]; then
          echo "✅ Performance tests completed"
          # Parse performance results for regression detection
          node scripts/check-performance-regressions.js
        else
          echo "⚠️ No performance results found"
        fi

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage/lcov.info
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: true

    - name: Archive coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report-${{ matrix.node-version }}
        path: coverage/
        retention-days: 30

    - name: Upload accessibility results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: accessibility-results-${{ matrix.node-version }}
        path: coverage/
        retention-days: 30

    - name: Upload performance results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: performance-results-${{ matrix.node-version }}
        path: coverage/
        retention-days: 30

    - name: Upload test metrics
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-metrics-${{ matrix.node-version }}
        path: |
          coverage/test-metrics.json
          coverage/flaky-tests.json
        retention-days: 30

    - name: Build Storybook for visual testing
      run: npm run build-storybook

    - name: Run visual tests (Chromatic)
      if: github.event_name == 'pull_request'
      uses: chromaui/action@latest
      with:
        projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
        buildScriptName: build-storybook
        exitZeroOnChanges: true # Don't fail PRs on visual changes
        exitOnceUploaded: true
        onlyChanged: true

    - name: Comment coverage on PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const coverage = JSON.parse(fs.readFileSync('coverage/coverage-final.json', 'utf8'));

          // Calculate summary
          let lines = 0, linesCovered = 0;
          let branches = 0, branchesCovered = 0;
          let functions = 0, functionsCovered = 0;

          for (const file in coverage) {
            const c = coverage[file];
            lines += c.s ? Object.keys(c.s).length : 0;
            linesCovered += c.s ? Object.values(c.s).filter(v => v > 0).length : 0;
            branches += c.b ? Object.keys(c.b).length * 2 : 0;
            branchesCovered += c.b ? Object.values(c.b).flat().filter(v => v > 0).length : 0;
            functions += c.f ? Object.keys(c.f).length : 0;
            functionsCovered += c.f ? Object.values(c.f).filter(v => v > 0).length : 0;
          }

          const linePct = ((linesCovered / lines) * 100).toFixed(2);
          const branchPct = ((branchesCovered / branches) * 100).toFixed(2);
          const funcPct = ((functionsCovered / functions) * 100).toFixed(2);

          // Check accessibility results
          let accessibilityStatus = "✅ Passed";
          let accessibilityScore = "100%";
          
          try {
            if (fs.existsSync('coverage/a11y-results.json')) {
              const a11yResults = JSON.parse(fs.readFileSync('coverage/a11y-results.json', 'utf8'));
              accessibilityScore = a11yResults.score ? `${a11yResults.score}%` : "Unknown";
              if (a11yResults.violations > 0 || a11yResults.criticalViolations > 0) {
                accessibilityStatus = "⚠️ Issues found";
              }
            }
          } catch (error) {
            accessibilityStatus = "❓ No data";
          }

          // Check performance results
          let performanceStatus = "✅ Passed";
          let performanceScore = "Good";
          let regressions = 0;
          
          try {
            if (fs.existsSync('coverage/performance-results.json')) {
              const perfResults = JSON.parse(fs.readFileSync('coverage/performance-results.json', 'utf8'));
              performanceScore = perfResults.score ? `${perfResults.score}%` : "Unknown";
              regressions = perfResults.regressions || 0;
              if (regressions > 0) {
                performanceStatus = "⚠️ Regressions detected";
              }
            }
          } catch (error) {
            performanceStatus = "❓ No data";
          }

          // Check flaky test results
          let flakyStatus = "✅ No flaky tests detected";
          let flakyCount = 0;
          
          try {
            if (fs.existsSync('coverage/flaky-tests.json')) {
              const flakyResults = JSON.parse(fs.readFileSync('coverage/flaky-tests.json', 'utf8'));
              flakyCount = flakyResults.analysis?.summary?.flakyCount || 0;
              if (flakyCount > 0) {
                flakyStatus = `⚠️ ${flakyCount} flaky tests detected`;
              }
            }
          } catch (error) {
            flakyStatus = "❓ No flaky test data";
          }
          let contractStatus = "✅ Passed";
          try {
            if (fs.existsSync('tests/contracts/pacts')) {
              const contractFiles = fs.readdirSync('tests/contracts/pacts');
              if (contractFiles.length > 0) {
                contractStatus = "✅ Contracts generated";
              } else {
                contractStatus = "⚠️ No contracts found";
              }
            } else {
              contractStatus = "❓ No contract data";
            }
          } catch (error) {
            contractStatus = "❓ Error checking contracts";
          }

          const comment = \`## 📊 Test Results Report

          ### Code Coverage
          | Metric | Coverage |
          |--------|----------|
          | Lines | \${linePct}% |
          | Branches | \${branchPct}% |
          | Functions | \${funcPct}% |

          ### Accessibility Testing
          | Metric | Result |
          |--------|--------|
          | Status | \${accessibilityStatus} |
          | Score | \${accessibilityScore} |

          ### Performance Testing
          | Metric | Result |
          |--------|--------|
          | Status | \${performanceStatus} |
          | Score | \${performanceScore} |
          | Regressions | \${regressions} |

          ### Flaky Test Detection
          | Metric | Result |
          |--------|--------|
          | Status | \${flakyStatus} |
          | Flaky Tests | \${flakyCount} |

          ### Contract Testing
          | Metric | Result |
          |--------|--------|
          | Status | \${contractStatus} |

          **Overall Status**: \${linePct === '100.00' && branchPct === '100.00' && funcPct === '100.00' && accessibilityStatus.includes("✅") && performanceStatus.includes("✅") && contractStatus.includes("✅") && flakyCount === 0 ? '✅ All tests passed!' : '⚠️ Some issues detected'}

          [View detailed report](https://github.com/\${{ github.repository }}/actions/runs/\${{ github.run_id }})\`;

          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });
