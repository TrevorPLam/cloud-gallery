name: Test Metrics & Monitoring

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Daily metrics collection at 03:00 UTC
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      notify_slack:
        description: 'Send Slack notification regardless of outcome'
        required: false
        default: 'false'
        type: boolean

# Minimal permissions – read code, write PR comments and job summaries
permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  # ──────────────────────────────────────────────────────────────────────────────
  # 1. Run full test suite and collect metrics
  # ──────────────────────────────────────────────────────────────────────────────
  collect-metrics:
    name: Collect Test Metrics (${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
        with:
          persist-credentials: false

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@1e60f620b9541d16bece96c5465dc8ee9832be0b # v4.0.3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Restore metrics history so trend analysis has prior data
      - name: Restore metrics history
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: .metrics-history
          key: metrics-history-node${{ matrix.node-version }}-${{ github.run_id }}
          restore-keys: |
            metrics-history-node${{ matrix.node-version }}-

      # Run the full test suite with JSON reporter so collect-test-metrics.js
      # can parse individual test outcomes for flaky-test detection.
      - name: Run tests with coverage
        run: npm run test:coverage
        continue-on-error: true
        env:
          TEST_RESULTS_PATH: test-results.json

      # Collect structured metrics from coverage output and test results
      - name: Collect test metrics
        run: node scripts/collect-test-metrics.js

      # Analyse trends against historical snapshots and write coverage/test-trends.json
      - name: Analyse test trends
        run: node scripts/analyze-test-trends.js

      # Emit a rich Job Summary (visible in the Actions tab)
      - name: Write job summary
        if: always()
        run: |
          node - <<'JS'
          const fs = require('fs');

          function readJson(p, d = null) {
            try { return JSON.parse(fs.readFileSync(p, 'utf8')); } catch { return d; }
          }

          const metrics = readJson('coverage/test-metrics.json', {});
          const trends  = readJson('coverage/test-trends.json',  {});

          const t  = metrics.tests    ?? {};
          const c  = metrics.coverage ?? {};
          const td = trends.tests?.delta    ?? null;
          const cd = trends.coverage?.delta ?? null;

          const sign = v => v >= 0 ? `+${v}` : `${v}`;
          const passIcon = (t.failed ?? 0) === 0 ? '✅' : '❌';

          let md = `## 📊 Test Metrics Report\n\n`;
          md += `**Branch:** \`${metrics.ci?.branch ?? 'unknown'}\` | `;
          md += `**Node:** ${metrics.ci?.nodeVersion ?? 'unknown'} | `;
          md += `**Run:** [#${metrics.ci?.runNumber ?? '?'}](https://github.com/${metrics.ci?.repository ?? ''}/actions/runs/${metrics.ci?.runId ?? ''})\n\n`;

          // Tests table
          md += `### ${passIcon} Test Execution\n`;
          md += `| Metric | Value | Δ vs Previous |\n`;
          md += `|--------|-------|---------------|\n`;
          md += `| Total tests | ${t.total ?? '–'} | ${td ? sign(t.total - (trends.tests?.previous?.total ?? t.total)) : '–'} |\n`;
          md += `| Passed | ${t.passed ?? '–'} | – |\n`;
          md += `| Failed | ${t.failed ?? '–'} | – |\n`;
          md += `| Pass rate | ${t.passRate ?? '–'}% | ${td ? sign(td.passRate) + '%' : '–'} |\n`;
          md += `| Duration | ${t.durationSeconds != null ? t.durationSeconds + 's' : '–'} | ${td?.durationSeconds != null ? sign(td.durationSeconds) + 's' : '–'} |\n`;
          md += `| Flaky suites | ${t.flakySuiteCount ?? 0} | ${td ? sign(td.flakySuiteCount) : '–'} |\n\n`;

          // Coverage table
          if (Object.keys(c).length > 0) {
            md += `### 📋 Code Coverage\n`;
            md += `| Metric | Coverage | Δ vs Previous |\n`;
            md += `|--------|----------|---------------|\n`;
            md += `| Lines | ${c.lines ?? '–'}% | ${cd ? sign(cd.lines) + '%' : '–'} |\n`;
            md += `| Functions | ${c.functions ?? '–'}% | ${cd ? sign(cd.functions) + '%' : '–'} |\n`;
            md += `| Branches | ${c.branches ?? '–'}% | ${cd ? sign(cd.branches) + '%' : '–'} |\n\n`;
          }

          // Anomalies
          const anomalies = trends.anomalies ?? [];
          if (anomalies.length > 0) {
            md += `### ⚠️ Trend Anomalies\n`;
            anomalies.forEach(a => { md += `- ${a}\n`; });
            md += '\n';
          } else {
            md += `### ✅ No Trend Anomalies\n\n`;
          }

          // Flaky test suites
          if ((t.flakySuites ?? []).length > 0) {
            md += `### 🔁 Flaky Test Suites\n`;
            t.flakySuites.forEach(s => { md += `- \`${s}\`\n`; });
            md += '\n';
          }

          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, md);
          console.log('Job summary written.');
          JS

      # Persist metrics history so future runs can compute deltas
      - name: Save metrics history
        if: always()
        uses: actions/cache/save@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: .metrics-history
          key: metrics-history-node${{ matrix.node-version }}-${{ github.run_id }}

      # Upload metrics artefacts for downstream jobs and dashboards
      - name: Upload metrics artefacts
        if: always()
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874 # v4.4.0
        with:
          name: test-metrics-node${{ startsWith(matrix.node-version, '18') && '18' || '20' }}
          path: |
            coverage/test-metrics.json
            coverage/test-trends.json
          retention-days: 90

  # ──────────────────────────────────────────────────────────────────────────────
  # 2. Post consolidated PR comment with metrics dashboard
  # ──────────────────────────────────────────────────────────────────────────────
  metrics-dashboard:
    name: Post Metrics Dashboard
    runs-on: ubuntu-latest
    needs: collect-metrics
    if: >
      always() &&
      github.event_name == 'pull_request' &&
      needs.collect-metrics.result != 'skipped'
    permissions:
      contents: read
      pull-requests: write
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
        with:
          persist-credentials: false

      # Download metrics from Node 20.x (canonical matrix leg)
      - name: Download metrics artefacts
        uses: actions/download-artifact@fa0a91b85d4f404e444306234e39e5d2741ba14e # v4.1.8
        with:
          name: test-metrics-node20
          path: downloaded-metrics

      - name: Post PR comment
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        env:
          METRICS_DIR: downloaded-metrics
        with:
          script: |
            const fs   = require('fs');
            const path = require('path');
            const dir  = process.env.METRICS_DIR;

            function readJson(p, d = null) {
              try { return JSON.parse(fs.readFileSync(p, 'utf8')); } catch { return d; }
            }

            const metrics = readJson(path.join(dir, 'test-metrics.json'), {});
            const trends  = readJson(path.join(dir, 'test-trends.json'),  {});

            const t  = metrics.tests    ?? {};
            const c  = metrics.coverage ?? {};
            const td = trends.tests?.delta    ?? null;
            const cd = trends.coverage?.delta ?? null;

            const sign     = v => v >= 0 ? `+${v}` : `${v}`;
            const passIcon = (t.failed ?? 0) === 0 ? '✅' : '❌';
            const allGreen = (t.failed ?? 0) === 0 &&
                             (c.lines     ?? 0) >= 100 &&
                             (c.functions ?? 0) >= 100 &&
                             (c.branches  ?? 0) >= 100;

            const anomalies = trends.anomalies ?? [];

            let body = `## 📊 Test Metrics Dashboard\n\n`;
            body += `> Node 20.x · ${metrics.ci?.sha?.slice(0, 7) ?? 'unknown'} · `;
            body += `[View run](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${{ github.run_id }})\n\n`;

            // ── Test Execution ──
            body += `### ${passIcon} Test Execution\n`;
            body += `| Metric | Value | Δ vs Previous |\n`;
            body += `|--------|-------|---------------|\n`;
            body += `| Pass rate | ${t.passRate ?? '–'}% | ${td ? sign(td.passRate) + '%' : '–'} |\n`;
            body += `| Total | ${t.total ?? '–'} | – |\n`;
            body += `| Passed | ${t.passed ?? '–'} | – |\n`;
            body += `| Failed | ${t.failed ?? '–'} | – |\n`;
            body += `| Duration | ${t.durationSeconds != null ? t.durationSeconds + 's' : '–'} | ${td?.durationSeconds != null ? sign(td.durationSeconds) + 's' : '–'} |\n`;
            body += `| Flaky suites | ${t.flakySuiteCount ?? 0} | ${td ? sign(td.flakySuiteCount) : '–'} |\n\n`;

            // ── Coverage ──
            if (Object.keys(c).length > 0) {
              body += `### 📋 Code Coverage\n`;
              body += `| Metric | Coverage | Δ vs Previous |\n`;
              body += `|--------|----------|---------------|\n`;
              body += `| Lines | ${c.lines ?? '–'}% | ${cd ? sign(cd.lines) + '%' : '–'} |\n`;
              body += `| Functions | ${c.functions ?? '–'}% | ${cd ? sign(cd.functions) + '%' : '–'} |\n`;
              body += `| Branches | ${c.branches ?? '–'}% | ${cd ? sign(cd.branches) + '%' : '–'} |\n\n`;
            }

            // ── Trend Anomalies ──
            if (anomalies.length > 0) {
              body += `### ⚠️ Trend Anomalies\n`;
              anomalies.forEach(a => { body += `- ${a}\n`; });
              body += '\n';
            }

            // ── Flaky suites ──
            if ((t.flakySuites ?? []).length > 0) {
              body += `### 🔁 Flaky Test Suites\n`;
              t.flakySuites.forEach(s => { body += `- \`${s}\`\n`; });
              body += '\n';
            }

            body += `\n**Overall**: ${allGreen && anomalies.length === 0 ? '✅ All metrics green' : '⚠️ Action required — see details above'}`;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              body,
            });

  # ──────────────────────────────────────────────────────────────────────────────
  # 3. Failure notifications (Slack + GitHub issue)
  # ──────────────────────────────────────────────────────────────────────────────
  notify-on-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: collect-metrics
    # Run on push to main/develop when tests failed, or on scheduled run failures
    if: >
      always() &&
      needs.collect-metrics.result == 'failure' &&
      (github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
        with:
          persist-credentials: false

      # Download metrics for notification context (best-effort)
      - name: Download metrics artefacts
        continue-on-error: true
        uses: actions/download-artifact@fa0a91b85d4f404e444306234e39e5d2741ba14e # v4.1.8
        with:
          name: test-metrics-node20
          path: downloaded-metrics

      # Slack notification (skipped when secret is not configured)
      - name: Check Slack secret availability
        id: slack-check
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Send Slack notification
        if: steps.slack-check.outputs.available == 'true'
        uses: slackapi/slack-github-action@fcfb566f8b0aab22203f066d80ca1d7e4b5d05b3 # v1.27.0
        with:
          payload: |
            {
              "text": "❌ Test suite failed on *${{ github.repository }}* — branch `${{ github.ref_name }}`",
              "blocks": [
                {
                  "type": "header",
                  "text": { "type": "plain_text", "text": "❌ Test Failure Alert" }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Repository:*\n${{ github.repository }}" },
                    { "type": "mrkdwn", "text": "*Branch:*\n`${{ github.ref_name }}`" },
                    { "type": "mrkdwn", "text": "*Triggered by:*\n${{ github.actor }}" },
                    { "type": "mrkdwn", "text": "*Commit:*\n`${{ github.sha }}`" }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": { "type": "plain_text", "text": "View Run" },
                      "url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      # Open a GitHub issue to track the failure (main branch only)
      - name: Create GitHub issue for failure
        if: github.ref == 'refs/heads/main'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const fs   = require('fs');
            const path = require('path');

            function readJson(p, d = null) {
              try { return JSON.parse(fs.readFileSync(p, 'utf8')); } catch { return d; }
            }

            const metrics = readJson(path.join('downloaded-metrics', 'test-metrics.json'), {});
            const t = metrics.tests ?? {};

            const title = `🔴 Test suite failure on main — run #${{ github.run_number }}`;
            const body  = [
              `## Test Suite Failure`,
              ``,
              `A test run on \`main\` failed. Immediate investigation required.`,
              ``,
              `| Field | Value |`,
              `|-------|-------|`,
              `| Branch | \`${{ github.ref_name }}\` |`,
              `| Commit | \`${{ github.sha }}\` |`,
              `| Actor | @${{ github.actor }} |`,
              `| Run | [#${{ github.run_number }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) |`,
              `| Pass rate | ${t.passRate ?? 'unknown'}% |`,
              `| Failed tests | ${t.failed ?? 'unknown'} |`,
              ``,
              `Please investigate and fix the failing tests before the next deployment.`,
            ].join('\n');

            // Check whether an open issue with the same title already exists to
            // avoid duplicate issues for repeated failures on the same run.
            const existing = await github.rest.issues.listForRepo({
              owner:  context.repo.owner,
              repo:   context.repo.repo,
              state:  'open',
              labels: 'test-failure',
              per_page: 10,
            });

            const duplicate = existing.data.find(i => i.title === title);
            if (duplicate) {
              console.log('Duplicate issue found – skipping creation:', duplicate.html_url);
              return;
            }

            const issue = await github.rest.issues.create({
              owner:  context.repo.owner,
              repo:   context.repo.repo,
              title,
              body,
              labels: ['test-failure', 'priority: high'],
            });

            console.log('Issue created:', issue.data.html_url);

  # ──────────────────────────────────────────────────────────────────────────────
  # 4. Trend anomaly notification (push to main)
  # ──────────────────────────────────────────────────────────────────────────────
  notify-trend-anomalies:
    name: Notify Trend Anomalies
    runs-on: ubuntu-latest
    needs: collect-metrics
    if: >
      always() &&
      needs.collect-metrics.result == 'success' &&
      github.ref == 'refs/heads/main'
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
        with:
          persist-credentials: false

      - name: Download metrics artefacts
        continue-on-error: true
        uses: actions/download-artifact@fa0a91b85d4f404e444306234e39e5d2741ba14e # v4.1.8
        with:
          name: test-metrics-node20
          path: downloaded-metrics

      - name: Check and report anomalies
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const fs   = require('fs');
            const path = require('path');

            function readJson(p, d = null) {
              try { return JSON.parse(fs.readFileSync(p, 'utf8')); } catch { return d; }
            }

            const trends    = readJson(path.join('downloaded-metrics', 'test-trends.json'), {});
            const anomalies = trends.anomalies ?? [];

            if (anomalies.length === 0) {
              console.log('✅ No trend anomalies detected');
              return;
            }

            console.log(`⚠️ ${anomalies.length} trend anomaly(ies) detected`);
            anomalies.forEach(a => console.log(' •', a));

            const title = `⚠️ Test trend anomalies detected — run #${{ github.run_number }}`;
            const body  = [
              `## Test Trend Anomalies`,
              ``,
              `The following quality regressions were detected compared to the previous run:`,
              ``,
              ...anomalies.map(a => `- ${a}`),
              ``,
              `| Field | Value |`,
              `|-------|-------|`,
              `| Branch | \`${{ github.ref_name }}\` |`,
              `| Commit | \`${{ github.sha }}\` |`,
              `| Run | [#${{ github.run_number }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) |`,
            ].join('\n');

            const issue = await github.rest.issues.create({
              owner:  context.repo.owner,
              repo:   context.repo.repo,
              title,
              body,
              labels: ['test-metrics', 'quality'],
            });

            console.log('Anomaly issue created:', issue.data.html_url);
